<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#5C1F20;--accent-rgb:92,31,32;
  --page-bg:#EDE9E3;--map-bg:#E8E3DB;--fade:#EDE9E3;--grid-line:rgba(170,160,145,0.18);
  --card-bg:#FFFFFF;--card-border:rgba(42,36,34,0.10);
  --txt1:#2A2422;--txt2:#7A716D;--chip-txt:#5A514D;
}
body{font-family:'Inter',sans-serif;background:var(--page-bg);overflow:hidden;width:100vw;height:100%;}
/* Midnight theme */
body.theme-midnight{
  --page-bg:#1A1613;--map-bg:#221C18;--fade:#1A1613;--grid-line:rgba(201,168,76,0.08);
  --card-bg:#2B2521;--card-border:rgba(255,255,255,0.10);
  --txt1:#F1EADC;--txt2:#A99F95;--chip-txt:#CFC5BA;
}
body.theme-midnight .chip-sep{background:rgba(255,255,255,0.14);}
body.theme-midnight .hs-count{background:rgba(122,155,118,0.20);}
body.theme-midnight .hs-count b{color:#AEC8A7;}
body.theme-midnight .hs-count span{color:#92AE8C;}
body.theme-midnight .hsearch > svg,body.theme-midnight .hs-input::placeholder{color:#8B847E;}
/* Plot shape */
body.plots-sharp .c{border-radius:0;}
body.plots-dot .c{border-radius:50%;}

/* ── LOADING ── */
#L{position:fixed;inset:0;background:#F5EFE6;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity 0.5s;}
#L p{font-size:11px;color:#999;letter-spacing:0.12em;text-transform:uppercase;}
.lb{width:120px;height:3px;background:#E0D8CC;border-radius:2px;overflow:hidden;}
.lf{height:100%;background:#C9A84C;animation:ld 2s ease forwards;}
@keyframes ld{from{width:0}to{width:100%}}

/* ══ HEADER — floating, Google-style ═════════════ */
#H{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:flex;flex-direction:column;gap:9px;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 0;
  pointer-events:none;
}
#H > *{pointer-events:auto;}

/* — Brand card — */
.hb{
  background:var(--card-bg);border-radius:16px;
  box-shadow:0 6px 20px rgba(42,36,34,0.10),0 1px 3px rgba(42,36,34,0.07);
  display:flex;align-items:center;gap:11px;padding:8px 10px 8px 9px;
}
.hb-founder{height:48px;width:auto;max-width:160px;object-fit:contain;border-radius:6px;flex-shrink:0;display:block;}
.hb-founder[style*="display:none"] ~ .hb-logo{display:block;}
.hb-home{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.1);color:#5C4A2A;text-decoration:none;flex-shrink:0;transition:background 0.15s;}
.hb-home:hover{background:rgba(0,0,0,0.12);}
.hb-logo{height:40px;width:auto;display:none;flex-shrink:0;}
body.theme-midnight .hb-logo{background:#F1EADC;border-radius:8px;padding:3px 7px;}
.hb-mapbtn{flex-shrink:0;white-space:nowrap;background:rgba(var(--accent-rgb),0.10);color:var(--accent);border:1px solid rgba(var(--accent-rgb),0.22);border-radius:20px;padding:9px 14px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:background 0.15s,transform 0.08s;}
.hb-mapbtn:hover{background:rgba(var(--accent-rgb),0.16);}
.hb-mapbtn:active{transform:scale(0.95);}
body.theme-midnight .hb-mapbtn,body.theme-midnight .b3-filter{color:#EADFD2;background:rgba(var(--accent-rgb),0.24);border-color:rgba(255,255,255,0.16);}
.hb-logotxt{width:42px;height:42px;background:#2A2422;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:1px;}
.hb-logotxt span:first-child{font-size:9px;font-weight:700;color:#F1EADC;letter-spacing:0.08em;line-height:1;}
.hb-logotxt span:last-child{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:#C9A84C;letter-spacing:0.04em;line-height:1;}
.hb-info{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
.hb-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;color:var(--txt1);letter-spacing:-0.01em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hb-sub{font-size:11.5px;font-weight:500;color:var(--txt2);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hb-actions{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.iconbtn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,transform 0.08s;text-decoration:none;}
.iconbtn:active{transform:scale(0.93);}
.iconbtn svg{width:19px;height:19px;}
.ib-map{background:rgba(var(--accent-rgb),0.10);color:var(--accent);}
.ib-map:hover{background:rgba(var(--accent-rgb),0.16);}
.ib-wa{background:#25D366;color:#fff;}
.ib-wa:hover{background:#1eb858;}

/* — Search bar — */
.hsearch{
  background:var(--card-bg);border-radius:14px;
  box-shadow:0 6px 20px rgba(42,36,34,0.10),0 1px 3px rgba(42,36,34,0.07);
  display:flex;align-items:center;gap:10px;padding:11px 12px;transition:box-shadow 0.15s;
}
.hsearch:focus-within{box-shadow:0 6px 22px rgba(var(--accent-rgb),0.16),0 0 0 2px rgba(var(--accent-rgb),0.32);}
.hsearch > svg{width:19px;height:19px;color:#9A918C;flex-shrink:0;}
.hs-input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:var(--txt1);min-width:0;}
.hs-input::placeholder{color:#A39A93;}
.hs-count{display:flex;align-items:center;gap:6px;flex-shrink:0;background:rgba(122,155,118,0.15);border-radius:20px;padding:5px 11px 5px 9px;}
.hs-count .dot{width:7px;height:7px;border-radius:50%;background:#5E7E5A;flex-shrink:0;}
.hs-count b{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#3F5C3B;line-height:1;}
.hs-count span{font-size:11.5px;color:#6B8766;font-weight:500;}

/* — Chip row — */
.hchips{display:flex;align-items:center;gap:7px;overflow-x:auto;padding:1px 2px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.hchips::-webkit-scrollbar{display:none;}
.hchips::after{content:'';flex:0 0 4px;}
.chip-sep{width:1px;height:20px;background:rgba(42,36,34,0.13);flex-shrink:0;margin:0 1px;}
.fchip,.schip,.b3-filter{
  display:inline-flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap;
  background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;
  box-shadow:0 2px 7px rgba(42,36,34,0.08);
  font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;color:var(--chip-txt);
  cursor:pointer;user-select:none;transition:transform 0.13s ease,box-shadow 0.13s ease;padding:7px 13px;
}
.fchip:active,.schip:active,.b3-filter:active{transform:scale(0.96);}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#FAF6EE;box-shadow:0 3px 9px rgba(var(--accent-rgb),0.30);}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.schip.on{color:var(--txt1);}
.schip.on.s-av{background:rgba(122,155,118,0.18);border-color:#7A9B76;}
.schip.on.s-re{background:rgba(196,154,108,0.18);border-color:#C49A6C;}
.schip.on.s-so{background:rgba(183,178,170,0.22);border-color:#B7B2AA;}
.schip.on.s-hd{background:rgba(167,134,94,0.18);border-color:#A7865E;}
.b3-filter{color:var(--accent);border-color:rgba(var(--accent-rgb),0.22);}
.b3-filter svg{width:14px;height:14px;}
.filter-badge{background:var(--accent);color:#FAF6EE;font-size:10px;font-weight:700;border-radius:9px;padding:1px 5px;min-width:16px;text-align:center;}

/* ══ MAP ════════════════════════════════════════ */
#M{position:absolute;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;background:var(--map-bg);touch-action:none;}
#M:active{cursor:grabbing;}
#M::before{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(to bottom,var(--fade) 0%,transparent 50px),

             linear-gradient(to right,var(--fade) 0%,transparent 40px),
             linear-gradient(to left,var(--fade) 0%,transparent 40px);}
#MB{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:32px 32px;}

#S{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:3;}
#G{display:grid;gap:3px;position:relative;z-index:4;margin:40px;}

.c:hover{transform:scale(1.18);box-shadow:0 3px 12px rgba(0,0,0,0.25);z-index:10;}
.c.e{background:transparent!important;border:none;cursor:default;pointer-events:none;}
.c.d{opacity:0.1;}
.av{background:#7A9B76;}.so{background:#B7B2AA;}.re{background:#C49A6C;}.hd{background:#A7865E;}
.hd::after{content:'';position:absolute;inset:-2px;border-radius:5px;border:1.5px solid #A7865E;animation:pl 2s infinite;pointer-events:none;}
@keyframes pl{0%,100%{opacity:0.9;transform:scale(1);}50%{opacity:0.2;transform:scale(1.05);}}

/* ══ MAP OVERLAYS ═══════════════════════════════ */
#IV{position:absolute;left:12px;z-index:20;background:rgba(247,245,242,0.96);border:1px solid #D8D2C8;border-radius:8px;padding:7px 12px;display:flex;gap:12px;}
.in{text-align:center;}
.inn{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;color:#2B2B2B;line-height:1;}
.inl{font-size:8px;color:#999;text-transform:uppercase;letter-spacing:0.06em;}
/* Zoom — top right */
#ZM{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:20;}
.zb{width:34px;height:34px;background:rgba(247,245,242,0.97);border:1px solid #D0CAC0;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2B2B2B;font-family:monospace;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.zb:hover{background:#2B2B2B;color:#fff;}
/* Compass — below zoom, 100x100 */
#CP{position:absolute;top:90px;right:8px;z-index:20;width:100px;height:100px;pointer-events:none;}
/* Disclaimer — top left, dismissible */
#disc{position:absolute;top:12px;left:12px;max-width:200px;background:rgba(247,245,242,0.92);border:1px solid #D8D2C8;border-radius:8px;padding:6px 8px 6px 8px;font-size:9px;color:#999;line-height:1.5;z-index:20;display:flex;gap:5px;align-items:flex-start;}
#disc button{background:none;border:none;color:#bbb;font-size:13px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-top:-1px;}

/* ══ BOTTOM SHEET ════════════════════════════════ */
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
#FSH{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.5);}
#FSC{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;max-height:82vh;overflow-y:auto;animation:sheetUp 0.28s cubic-bezier(0.32,0.72,0,1);}
.fs-handle{width:36px;height:4px;background:#E0D8CC;border-radius:2px;margin:12px auto 0;}
.fs-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;}
.fs-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:#1A1510;}
.fs-reset{background:transparent;border:none;font-size:12px;color:#C9A84C;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.fs-sec{padding:0 20px 16px;border-bottom:1px solid rgba(0,0,0,0.06);}
.fs-sec:last-of-type{border-bottom:none;}
.fs-lbl{font-size:10px;font-weight:600;color:#999;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:10px;}
.fs-chips{display:flex;gap:8px;flex-wrap:wrap;}
.fs-chip{display:inline-flex;align-items:center;background:#F5F2EE;border:1.5px solid #E0D8CC;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:500;color:#5C4A2A;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.12s;user-select:none;}
.fs-chip.on{background:#3D2E0A;border-color:#C9A84C;color:#E8C96E;}
.fs-apply{width:calc(100% - 40px);margin:0 20px 24px;padding:14px;background:#1E1912;color:#C9A84C;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* ══ CAD MAP VIEWER ══════════════════════════════ */
#CADV{display:none;position:fixed;inset:0;z-index:600;background:#000;flex-direction:column;}

#CADV-close{background:rgba(255,255,255,0.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
#CADV-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px;touch-action:pinch-zoom;}

.pbdy{padding:12px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pfl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
.pfv{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#1A1510;}

.pbtn{padding:13px;border-radius:10px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.penq{background:#1E1912;color:#C9A84C;}.pwa{background:#25D366;color:#fff;}

function parseCSVRow(row){
  var cols=[],cur='',inq=false;
  for(var i=0;i<row.length;i++){
    var ch=row[i];
    if(ch==='"'){inq=!inq;}
    else if(ch===','&&!inq){cols.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  cols.push(cur.trim());
  return cols;
}
function parseP(csv){
  var lines=csv.split('\n'),out=[];
  for(var i=1;i<lines.length;i++){
    var c=parseCSVRow(lines[i]);
    if(!c[0])continue;
    out.push({no:c[0],row:parseInt(c[1])||0,col:parseInt(c[2])||0,cents:c[3],sqft:c[4],facing:c[5],ppc:c[6],cat:c[7],stat:c[8],price:c[9],corner:(c[10]||'').toLowerCase()==='true',park:(c[11]||'').toLowerCase()==='true'});
  }
  return out;
}
function parseLM(csv){
  var lines=csv.split('\n'),out=[];
  for(var i=1;i<lines.length;i++){
    var c=parseCSVRow(lines[i]);
    if(!c[0])continue;
    out.push({type:c[0],lable:c[1],label:c[2]||c[1],rs:parseInt(c[3])||0,re:parseInt(c[4])||0,cs:parseInt(c[5])||0,ce:parseInt(c[6])||0,color:c[7],icon:(c[8]||'').toLowerCase(),custom_svg:c[9],dimension:c[10],image_url:c[11],highlight:c[12],description:c[13]});
  }
  return out;
}

// Filter sheet
function openFilterSheet(){document.getElementById('FSH').style.display='block';}
function closeFilterSheet(){document.getElementById('FSH').style.display='none';updateFilterBadge();}
function updateFilterBadge(){
  var count=0;
  if(fFacing!=='All')count++;
  if(fCorner)count++;
  if(fPark)count++;
  var k=Object.keys(fStats);
  for(var i=0;i<k.length;i++){if(!fStats[k[i]])count++;}
  var b=document.getElementById('filterBadge');
  if(count>0){b.textContent=count;b.style.display='inline';}
  else{b.style.display='none';}
}
function setFacing(btn){
  fFacing=btn.getAttribute('data-facing');
  var chips=document.querySelectorAll('[data-facing]');
  for(var i=0;i<chips.length;i++){chips[i].classList.toggle('on',chips[i].getAttribute('data-facing')===fFacing);}
  applyF();
}
function setFacingSheet(btn){
  fFacing=btn.getAttribute('data-facing');
  var chips=document.querySelectorAll('[data-facing]');
  for(var i=0;i<chips.length;i++){chips[i].classList.toggle('on',chips[i].getAttribute('data-facing')===fFacing);}
  applyF();
}
function toggleFsChip(btn,type){
  if(type==='corner'){fCorner=!fCorner;btn.classList.toggle('on',fCorner);}
  else if(type==='park'){fPark=!fPark;btn.classList.toggle('on',fPark);}
  applyF();
}
function toggleFsStat(btn){
  var stat=btn.getAttribute('data-stat');
  fStats[stat]=!fStats[stat];
  btn.classList.toggle('on',fStats[stat]);
  var sc2=document.querySelectorAll('.schip[data-stat]');
  for(var i=0;i<sc2.length;i++){if(sc2[i].getAttribute('data-stat')===stat)sc2[i].classList.toggle('on',fStats[stat]);}
  applyF();
}
function toggleStat(btn){
  var stat=btn.getAttribute('data-stat');
  fStats[stat]=!fStats[stat];
  btn.classList.toggle('on');
  var fs=document.querySelectorAll('.fs-stat[data-stat]');
  for(var i=0;i<fs.length;i++){if(fs[i].getAttribute('data-stat')===stat)fs[i].classList.toggle('on',fStats[stat]);}
  applyF();
}
function handleSearch(val){searchTerm=val.toLowerCase().trim();applyF();}
function resetFilters(){
  fFacing='All';fCorner=false;fPark=false;
  fStats={'Available':true,'Reserved':true,'Sold':true,'Hot Deal':true};
  searchTerm='';
  var si=document.getElementById('searchInput');if(si)si.value='';
  var chips=document.querySelectorAll('[data-facing]');
  for(var i=0;i<chips.length;i++){chips[i].classList.toggle('on',chips[i].getAttribute('data-facing')==='All');}
  document.getElementById('fsCorner').classList.remove('on');
  document.getElementById('fsPark').classList.remove('on');
  var all=document.querySelectorAll('.schip[data-stat],.fs-stat[data-stat]');
  for(var j=0;j<all.length;j++){all[j].classList.add('on');}
  applyF();updateFilterBadge();
}
function applyF(){
  for(var i=0;i<plots.length;i++){
    var p=plots[i];
    var el=document.getElementById('p'+p.row+'_'+p.col);
    if(!el)continue;
    var show=true;
    if(fFacing!=='All'&&p.facing!==fFacing)show=false;
    if(fCorner&&!p.corner)show=false;
    if(fPark&&!p.park)show=false;
    if(!fStats[p.stat])show=false;
    if(searchTerm){
      var match=p.no.toLowerCase().indexOf(searchTerm)>=0||(p.cents&&p.cents.toLowerCase().indexOf(searchTerm)>=0)||(p.facing&&p.facing.toLowerCase().indexOf(searchTerm)>=0);
      if(!match)show=false;
    }
    el.classList.toggle('d',!show);
  }
}

function posLayout(){
  var hh=document.getElementById('H').offsetHeight;
  var m=document.getElementById('M');
  m.style.top='0px';
  var top=hh+8;
  var iv=document.getElementById('IV');
  if(iv)iv.style.top=top+'px';
  var disc=document.getElementById('disc');
  if(disc)disc.style.top=top+'px';
  var zm=document.getElementById('ZM');
  if(zm)zm.style.top=top+'px';
  var cp=document.getElementById('CP');
  if(cp)cp.style.top=(top+78)+'px';
}
function applyT(){document.getElementById('C').style.transform='translate('+px+'px,'+py+'px) scale('+sc+')';}
function center(){
  var m=document.getElementById('M');
  var mw=m.offsetWidth;
  var mh=window.innerHeight;
  var hh=document.getElementById('H').offsetHeight;
  var avW=mw-24;
  var avH=mh-hh-24;
  var cw=COLS*STEP+PAD*2,ch=ROWS*STEP+PAD*2;
  var scW=avW/cw,scH=avH/ch;
  sc=Math.min(scW,scH,1);
  px=(mw-cw*sc)/2;
  py=hh+12;
  applyT();
}
function zoom(factor){
  var m=document.getElementById('M');
  var cx=m.offsetWidth/2,cy=m.offsetHeight/2;
  px=cx-(cx-px)*factor;py=cy-(cy-py)*factor;sc*=factor;applyT();
}

var ARCH_SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88.87 64.43" width="60" height="44"><g fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"><path d="M4,64V28C4,14,16,4,28,4h33c12,0,24,10,24,24v36"/><line x1="4" y1="64" x2="4" y2="56"/><line x1="85" y1="64" x2="85" y2="56"/><line x1="28" y1="4" x2="61" y2="4"/></g></svg>';


function getParkIcon(iconKey, cx, cy){
  var s='';
  var k=(ICON_MAP[iconKey]||iconKey||'').toLowerCase();
  // Also match by label name directly from sheet
  var lbl=iconKey.toLowerCase();
  if(k==='fountain'||lbl==='fountain'){
    // Fountain — basin + spray lines
    s+='<ellipse cx="'+cx+'" cy="'+(cy+8)+'" rx="10" ry="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>';
    s+='<line x1="'+cx+'" y1="'+(cy+4)+'" x2="'+cx+'" y2="'+(cy-8)+'" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>';
    s+='<line x1="'+(cx-5)+'" y1="'+(cy)+'" x2="'+(cx-9)+'" y2="'+(cy-6)+'" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>';
    s+='<line x1="'+(cx+5)+'" y1="'+(cy)+'" x2="'+(cx+9)+'" y2="'+(cy-6)+'" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>';
  } else if(k==='gym'||lbl==='outdoor gym'){
    // Dumbbell
    s+='<rect x="'+(cx-10)+'" y="'+(cy-2)+'" width="20" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>';
    s+='<rect x="'+(cx-14)+'" y="'+(cy-6)+'" width="5" height="12" rx="2" fill="rgba(255,255,255,0.8)"/>';
    s+='<rect x="'+(cx+9)+'" y="'+(cy-6)+'" width="5" height="12" rx="2" fill="rgba(255,255,255,0.8)"/>';
  } else if(k==='meditation'||lbl==='meditation area'){
    // Lotus / seated figure
    s+='<circle cx="'+cx+'" cy="'+(cy-6)+'" r="4" fill="rgba(255,255,255,0.8)"/>';
    s+='<path d="M'+(cx-10)+','+(cy+8)+' Q'+cx+','+(cy-1)+' '+(cx+10)+','+(cy+8)+'" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>';
  } else if(k==='football'||lbl==='football turf'){
    // Football / goal posts
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="9" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>';
    s+='<line x1="'+(cx-9)+'" y1="'+cy+'" x2="'+(cx+9)+'" y2="'+cy+'" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>';
    s+='<line x1="'+cx+'" y1="'+(cy-9)+'" x2="'+cx+'" y2="'+(cy+9)+'" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>';
  } else if(k==='electricity'||lbl==='electric grid'){
    // Lightning bolt
    s+='<polygon points="'+cx+','+(cy-11)+' '+(cx+5)+','+(cy)+' '+cx+','+(cy)+' '+(cx+3)+','+(cy+11)+' '+(cx-5)+','+(cy)+' '+cx+','+(cy)+'" fill="rgba(255,240,80,0.95)"/>';
  } else if(k==='water_tank'||lbl==='water tank'){
    // Tank cylinder
    s+='<rect x="'+(cx-8)+'" y="'+(cy-9)+'" width="16" height="13" rx="3" fill="rgba(255,255,255,0.7)"/>';
    s+='<rect x="'+(cx-5)+'" y="'+(cy+4)+'" width="10" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>';
  } else if(lbl==='walking garden'||lbl==='garden'||k==='garden'){
    // Tree / leaf
    s+='<circle cx="'+cx+'" cy="'+(cy-5)+'" r="8" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>';
    s+='<line x1="'+cx+'" y1="'+(cy+3)+'" x2="'+cx+'" y2="'+(cy+10)+'" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>';
  } else if(lbl==='pickleball court'){
    // Paddle + ball
    s+='<ellipse cx="'+(cx-2)+'" cy="'+(cy-2)+'" rx="7" ry="8" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>';
    s+='<rect x="'+(cx+4)+'" y="'+(cy+4)+'" width="2" height="7" rx="1" fill="rgba(255,255,255,0.8)" transform="rotate(-40,'+(cx+5)+','+(cy+7)+')"/>';
    s+='<circle cx="'+(cx+8)+'" cy="'+(cy+8)+'" r="2.5" fill="rgba(255,255,255,0.9)"/>';
  } else if(lbl==='pebble garden'){
    // Pebble dots pattern
    s+='<circle cx="'+(cx-5)+'" cy="'+(cy-4)+'" r="3" fill="rgba(255,255,255,0.7)"/>';
    s+='<circle cx="'+(cx+4)+'" cy="'+(cy-6)+'" r="2" fill="rgba(255,255,255,0.6)"/>';
    s+='<circle cx="'+(cx-3)+'" cy="'+(cy+3)+'" r="2.5" fill="rgba(255,255,255,0.65)"/>';
    s+='<circle cx="'+(cx+5)+'" cy="'+(cy+3)+'" r="3" fill="rgba(255,255,255,0.7)"/>';
    s+='<circle cx="'+cx+'" cy="'+(cy-1)+'" r="2" fill="rgba(255,255,255,0.5)"/>';
  } else if(lbl==="children's park"||lbl==='childrens park'){
    // Slide shape
    s+='<circle cx="'+(cx-4)+'" cy="'+(cy-7)+'" r="4" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8"/>';
    s+='<line x1="'+(cx-4)+'" y1="'+(cy-3)+'" x2="'+(cx-4)+'" y2="'+(cy+3)+'" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>';
    s+='<path d="M'+(cx-4)+','+(cy+3)+' Q'+(cx+4)+','+(cy+5)+' '+(cx+9)+','+(cy+9)+'" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>';
  } else {

    s+='<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="rgba(255,255,255,0.3)"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="rgba(255,255,255,0.5)"/>';
  }
  return s;
}
function buildSVG(){
  var s=document.getElementById('S');
  var tw=COLS*STEP+PAD*2,th=ROWS*STEP+PAD*2;
  s.setAttribute('width',tw);s.setAttribute('height',th);
  var svg='';lmRegions=[];
  var roadW={'40 Ft Road':28,'30 Ft Road':25,'20 Ft Road':20};
  var intersections=[[3,8],[8,8],[7,12],[11,12],[15,12],[11,27],[15,27],[19,27],[23,27],[31,27],[35,27],[35,19]];
  var iBoxes=[];
  lms.forEach(function(lm){
    var tp=(lm.type||'').toLowerCase();
    var x1=gx(lm.cs),y1=gy(lm.rs);
    var x2=gx(lm.ce)+CELL,y2=gy(lm.re)+CELL;
    var w=x2-x1,h=y2-y1;
    if(tp==='road'){
      var rw=roadW[lm.label]||20;
      var isH=lm.rs===lm.re;
      var rx=isH?x1:gx(lm.cs)+(CELL-rw)/2;
      var ry=isH?gy(lm.rs)+(CELL-rw)/2:y1;
      var rw2=isH?w:rw,rh2=isH?rw:h;
      svg+='<rect x="'+rx+'" y="'+ry+'" width="'+rw2+'" height="'+rh2+'" fill="#9B9590" rx="2"/>';
      intersections.forEach(function(pt){
        if((isH&&pt[0]===lm.rs&&pt[1]>=lm.cs&&pt[1]<=lm.ce)||(!isH&&pt[1]===lm.cs&&pt[0]>=lm.rs&&pt[0]<=lm.re))iBoxes.push(pt);
      });
    } else if(tp==='park'){
      var pkColor=lm.color||'#4A7C59';
      svg+='<rect x="'+x1+'" y="'+y1+'" width="'+w+'" height="'+h+'" fill="'+pkColor+'" rx="4" opacity="0.85"/>';
      var iconKey=lm.icon||'';
      var lmLbl=(lm.label||lm.lable||'').toLowerCase();
      var cx2=x1+w/2, cy2=y1+h/2;
      svg+='<circle cx="'+cx2+'" cy="'+cy2+'" r="12" fill="rgba(255,255,255,0.18)"/>';
      svg+=getParkIcon(lmLbl||iconKey, cx2, cy2);
      lmRegions.push({name:lm.label||lm.lable||'',x:x1,y:y1,w:w,h:h});
    } else if(tp==='landmark'){
      var lmColor=lm.color||'#5C4033';
      svg+='<rect x="'+x1+'" y="'+y1+'" width="'+w+'" height="'+h+'" fill="'+lmColor+'" rx="4" opacity="0.9"/>';
      var lmLabel=lm.label||lm.lable||'';
      var disp=lmLabel==='Public Purpose'?'PP':lmLabel==='TANGEDCO'?'EG':lmLabel;
      svg+='<text x="'+(x1+w/2)+'" y="'+(y1+h/2+4)+'" text-anchor="middle" font-size="8" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.85)" font-weight="600">'+disp+'</text>';
      lmRegions.push({name:lmLabel==='Public Purpose'?'PP':lmLabel==='TANGEDCO'?'Electric Grid':lmLabel,x:x1,y:y1,w:w,h:h});
    } else if(tp==='entry'){
      var ex=gx(lm.cs)-30;
      var ey=lm.rs<1?gy(1)-50:gy(lm.rs)-8;
      svg+='<image href="data:image/svg+xml;utf8,'+encodeURIComponent(ARCH_SVG)+'" x="'+ex+'" y="'+ey+'" width="60" height="44"/>';
    }
  });
  iBoxes.forEach(function(pt){
    svg+='<rect x="'+gx(pt[1])+'" y="'+gy(pt[0])+'" width="'+CELL+'" height="'+CELL+'" fill="#9B9590"/>';
  });
  s.innerHTML=svg;
}

function buildGrid(){
  var g=document.getElementById('G');
  g.style.gridTemplateColumns='repeat('+COLS+','+CELL+'px)';
  var plotMap={};
  plots.forEach(function(p){plotMap[p.row+'_'+p.col]=p;});
  var html='';
  for(var r=1;r<=ROWS;r++){
    for(var c=1;c<=COLS;c++){
      var p=plotMap[r+'_'+c];
      if(!p){html+='<div class="c e"></div>';}
      else{
        var cls='c ';
        if(p.stat==='Available')cls+='av';
        else if(p.stat==='Sold')cls+='so';
        else if(p.stat==='Reserved')cls+='re';
        else if(p.stat==='Hot Deal')cls+='hd';
        html+='<div class="'+cls+'" id="p'+r+'_'+c+'" onclick="openPop(\''+p.no+'\')">'+p.no+'</div>';
      }
    }
  }
  g.innerHTML=html;buildSVG();center();
}

function openPop(no){
  var p=null;
  for(var i=0;i<plots.length;i++){if(plots[i].no===no){p=plots[i];break;}}
  if(!p)return;
  document.getElementById('ppNo').textContent='Plot '+p.no;
  document.getElementById('ppArea').textContent=(p.cents||'—')+' Cents';
  document.getElementById('ppFacing').textContent=p.facing||'—';
  document.getElementById('ppSqft').textContent=p.sqft?p.sqft+' sq.ft':'—';
  document.getElementById('ppCat').textContent=p.cat||'—';
  document.getElementById('ppPrice').textContent=p.price||'On Request';
  var bdg=document.getElementById('ppBdg');
  bdg.textContent=p.stat;
  var bc={'Available':'#7A9B76','Reserved':'#C49A6C','Sold':'#B7B2AA','Hot Deal':'#A7865E'};
  bdg.style.background=bc[p.stat]||'#888';
  var msg='Hello! I am interested in Plot No. '+p.no+' ('+p.cents+' Cents, '+p.facing+' Facing) at Bhaarat City 007. Please share more details.';
  document.getElementById('ppWA').onclick=function(){window.open('https://wa.me/918883147147?text='+encodeURIComponent(msg),'_blank');};
  document.getElementById('PO').classList.add('open');
}
function closePop(){document.getElementById('PO').classList.remove('open');}

function driveThumb(url){
  if(!url||url.length<10)return '';
  var m=url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m)return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w600';
  return url;
}
function openLPop(name){
  var d=lmData[name]||{type:'',desc:'Information coming soon.',dim:'',icon:'',img:''};
  document.getElementById('lpTitle').textContent=name;
  document.getElementById('lpSub').textContent=d.type||'';
  document.getElementById('lpDesc').textContent=d.desc||'';
  document.getElementById('lpDim').textContent=d.dim?'Area: '+d.dim:'';
  var coverEl=document.getElementById('lpCover');
  var iconWrap=document.getElementById('lpIconWrap');
  var iconEl=document.getElementById('lpIcon');
  var imgUrl=driveThumb(d.img);
  if(imgUrl){
    iconWrap.style.display='none';coverEl.style.display='block';coverEl.src=imgUrl;
    coverEl.onerror=function(){
      coverEl.style.display='none';iconWrap.style.display='flex';
      var ikey=ICON_MAP[d.icon||'']||d.icon||'';
      iconEl.innerHTML=SVGICONS[ikey]||ICON_FALLBACK;
    };
  } else {
    coverEl.style.display='none';iconWrap.style.display='flex';
    var ikey=ICON_MAP[d.icon||'']||d.icon||'';
    iconEl.innerHTML=SVGICONS[ikey]||ICON_FALLBACK;
  }
  document.getElementById('LPO').classList.add('open');
}
function closeLPop(){document.getElementById('LPO').classList.remove('open');}

function updateStats(){
  var avail=0,hot=0;
  for(var i=0;i<plots.length;i++){
    if(plots[i].stat==='Available')avail++;
    if(plots[i].stat==='Hot Deal')hot++;
  }
  var elA=document.getElementById('sA');if(elA)elA.textContent=avail;
  var elH=document.getElementById('sH');if(elH)elH.textContent=hot;
}

// Pan + pinch zoom
(function(){
  var map=document.getElementById('M');
  var drag=false,lx=0,ly=0;
  var pinching=false,lastDist=0;
  map.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mouseup',function(){drag=false;});
  window.addEventListener('mousemove',function(e){
    if(!drag)return;
    px+=e.clientX-lx;py+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT();
  });
  map.addEventListener('wheel',function(e){
    e.preventDefault();
    var rect=map.getBoundingClientRect();
    var cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    var factor=e.deltaY<0?1.1:0.91;
    px=cx-(cx-px)*factor;py=cy-(cy-py)*factor;sc*=factor;applyT();
  },{passive:false});
  map.addEventListener('touchstart',function(e){
    if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    else if(e.touches.length===2){
      pinching=true;drag=false;
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      lastDist=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:true});
  map.addEventListener('touchend',function(e){
    if(e.touches.length===0){drag=false;pinching=false;}
    else if(e.touches.length===1){pinching=false;drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  },{passive:true});
  map.addEventListener('touchmove',function(e){
    if(pinching&&e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(lastDist>0){
        var factor=dist/lastDist;
        var rect=map.getBoundingClientRect();
        var cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
        var cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
        px=cx-(cx-px)*factor;py=cy-(cy-py)*factor;sc*=factor;applyT();
      }
      lastDist=dist;
    } else if(drag&&e.touches.length===1){
      px+=e.touches[0].clientX-lx;py+=e.touches[0].clientY-ly;
      lx=e.touches[0].clientX;ly=e.touches[0].clientY;applyT();
    }
  },{passive:true});
  map.addEventListener('click',function(e){
    if(!lmRegions.length)return;
    var rect=document.getElementById('C').getBoundingClientRect();
    var mx=(e.clientX-rect.left)/sc,my=(e.clientY-rect.top)/sc;
    for(var i=0;i<lmRegions.length;i++){
      var r=lmRegions[i];
      if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){openLPop(r.name);break;}
    }
  });
})();

async function init(){
  setTimeout(posLayout,50);
  try{var r1=await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vROLfeWYfDytD6ZOmnLoZMttOoeqQsx_NwX3d5gvilWMamt5_Sf2MLkzPcSK24vOLh1BgAykyO3s1t1/pub?gid=1614198958&single=true&output=csv');plots=parseP(await r1.text());}catch(e){console.warn('plots:',e);plots=[];}
  try{
    var r2=await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vROLfeWYfDytD6ZOmnLoZMttOoeqQsx_NwX3d5gvilWMamt5_Sf2MLkzPcSK24vOLh1BgAykyO3s1t1/pub?gid=1297722648&single=true&output=csv');
    lms=parseLM(await r2.text());
    lms.forEach(function(lm){
      var tp=(lm.type||'').toLowerCase();
      if(tp==='park'||tp==='landmark'){
        var key=lm.label||lm.lable||'';
        if(key==='Public Purpose')key='PP';
        if(key==='TANGEDCO')key='Electric Grid';
        lmData[key]=lmData[key]||{};
        if(lm.highlight)lmData[key].type=lm.highlight;
        if(lm.description)lmData[key].desc=lm.description;
        if(lm.dimension)lmData[key].dim=lm.dimension;
        if(lm.image_url&&lm.image_url.length>5)lmData[key].img=lm.image_url;
        if(lm.icon)lmData[key].icon=lm.icon.toLowerCase();
      }
    });
  }catch(e){console.warn('landmarks:',e);lms=[];}
  buildGrid();updateStats();
  posLayout();
  // Re-run after fonts settle to get accurate header height
  setTimeout(function(){posLayout();center();},200);
  setTimeout(function(){posLayout();center();},600);
  setTimeout(function(){var l=document.getElementById('L');l.style.opacity='0';setTimeout(function(){l.style.display='none';},500);},2500);
  window.addEventListener('resize',function(){posLayout();center();});
}
init();

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "daylight",
  "plotShape": "rounded",
  "accent": "#5E7E5A"
}/*EDITMODE-END*/;

const ACCENT_RGB = { '#5C1F20':'92,31,32', '#8C4A3C':'140,74,60', '#5E7E5A':'94,126,90' };

function applyTweaks(t){
  var b=document.body;
  b.classList.toggle('theme-midnight', t.theme==='midnight');
  b.classList.remove('plots-rounded','plots-sharp','plots-dot');
  b.classList.add('plots-'+(t.plotShape||'rounded'));
  b.style.setProperty('--accent', t.accent);
  b.style.setProperty('--accent-rgb', ACCENT_RGB[t.accent] || '92,31,32');
}

function TweaksApp(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(function(){ applyTweaks(t); }, [t]);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Surface" />
      <TweakRadio label="Lighting" value={t.theme}
                  options={['daylight','midnight']}
                  onChange={function(v){setTweak('theme', v)}} />
      <TweakSection label="Plot texture" />
      <TweakRadio label="Cell shape" value={t.plotShape}
                  options={['rounded','sharp','dot']}
                  onChange={function(v){setTweak('plotShape', v)}} />
      <TweakSection label="Brand accent" />
      <TweakColor label="Accent" value={t.accent}
                  options={['#5C1F20','#8C4A3C','#5E7E5A']}
                  onChange={function(v){setTweak('accent', v)}} />
    </TweaksPanel>
  );
}

(function mountTweaks(){
  if(!window.useTweaks || !window.ReactDOM){ return setTimeout(mountTweaks, 60); }
  applyTweaks(TWEAK_DEFAULTS);
  ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);
})();
</script>
